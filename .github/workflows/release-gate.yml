name: Release Gate

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_legal_support_check:
        description: "Run legal/support URL check"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Flutter + Supabase Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      A_EMAIL: ${{ secrets.OPERATOR_EMAIL }}
      A_PASSWORD: ${{ secrets.OPERATOR_PASSWORD }}
      B_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
      B_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      RUN_SUPABASE_BOX_CYCLE: "0"
      RUN_LEGAL_SUPPORT_CHECK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_legal_support_check == 'true' && '1' || '0' }}
      LEGAL_PRIVACY_URL: ${{ vars.LEGAL_PRIVACY_URL }}
      LEGAL_IMPRINT_URL: ${{ vars.LEGAL_IMPRINT_URL }}
      SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for var in A_EMAIL A_PASSWORD B_EMAIL B_PASSWORD SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is missing. Configure repository secrets."
              missing=1
            fi
          done
          exit $missing

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: stable
          cache: true

      - name: Install zsh
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
          command -v zsh

      - name: Validate Supabase publishable key
        shell: bash
        run: |
          BASE="${SUPABASE_URL:-https://ucnvzrpcjkpaltuylvbv.supabase.co}"
          KEY="$(echo -n "${SUPABASE_PUBLISHABLE_KEY}" | tr -d '\r\n')"
          if [ -z "$KEY" ]; then
            echo "::error::SUPABASE_PUBLISHABLE_KEY is empty."
            exit 1
          fi
          STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/auth/v1/settings" -H "apikey: $KEY")"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Supabase key preflight failed (HTTP $STATUS). Check SUPABASE_PUBLISHABLE_KEY and optional SUPABASE_URL secret."
            exit 1
          fi

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      - name: Run release gate
        shell: bash
        run: |
          clean_secret() {
            local value="$1"
            value="$(printf "%s" "$value" | tr -d '\r')"
            if [[ "$value" == \"*\" && "$value" == *\" ]]; then
              value="${value:1:${#value}-2}"
            fi
            if [[ "$value" == \'*\' && "$value" == *\' ]]; then
              value="${value:1:${#value}-2}"
            fi
            printf "%s" "$value"
          }

          A_EMAIL_CLEAN="$(clean_secret "${A_EMAIL}")"
          A_PASSWORD_CLEAN="$(clean_secret "${A_PASSWORD}")"
          B_EMAIL_CLEAN="$(clean_secret "${B_EMAIL}")"
          B_PASSWORD_CLEAN="$(clean_secret "${B_PASSWORD}")"
          SUPABASE_KEY_CLEAN="$(clean_secret "${SUPABASE_PUBLISHABLE_KEY}")"

          A_EMAIL="$A_EMAIL_CLEAN" \
          A_PASSWORD="$A_PASSWORD_CLEAN" \
          B_EMAIL="$B_EMAIL_CLEAN" \
          B_PASSWORD="$B_PASSWORD_CLEAN" \
          SUPABASE_PUBLISHABLE_KEY="$SUPABASE_KEY_CLEAN" \
          "${{ github.workspace }}/scripts/release_gate_quick.sh"
